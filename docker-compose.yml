version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: omadarena-postgres
    restart: always
    environment:
      POSTGRES_USER: omadarena
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: omadarena
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: omadarena-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build: ./backend
    container_name: omadarena-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://omadarena:secretpassword@postgres:5432/omadarena?schema=public"
      REDIS_URL: "redis://redis:6379"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  admin:
    build: ./admin
    container_name: omadarena-admin
    restart: always
    ports:
      - "8081:80"

  webapp_front:
    build: ./webapp_front
    container_name: omadarena-webapp
    restart: always
    ports:
      - "8000:80"

volumes:
  postgres-data:
  redis-data:
